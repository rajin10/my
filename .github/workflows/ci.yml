name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────
  # Lint / Type-check / Test / Build
  # Runs on every PR and every push to main/staging.
  # ──────────────────────────────────────────────
  checks:
    name: Checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install

      # - name: Lint
      #   run: bun run lint

      - name: Type-check
        run: bun run check-types

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  # ──────────────────────────────────────────────
  # Deploy — only on push to main/staging, after checks pass.
  # Scoped to packages changed since the previous
  # commit via turbo's --filter='...[HEAD^1]'.
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: checks
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    timeout-minutes: 45
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      # Backend resources (D1, KV, queues) don't exist on the new Cloudflare
      # account yet — flip to 'true' once they are provisioned.
      DEPLOY_WORKERS: "false"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install

      # Determine which deployable packages changed in this push range.
      # Uses Turbo graph detection first, then falls back to path mapping.
      - name: Detect changed packages
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          BASE_SHA="$BEFORE_SHA"
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BASE_SHA="$(git rev-parse HEAD^1)"
          fi

          FILTER="...[$BASE_SHA]"

          TURBO_JSON="$(bunx turbo run deploy --filter="$FILTER" --dry=json 2>/dev/null || echo '{}')"
          CHANGED="$(printf '%s' "$TURBO_JSON" | python3 -c 'import json,sys; d=json.load(sys.stdin); pkgs=sorted({(t.get("package") or (t.get("taskId", "").split("#")[0] if t.get("taskId") else "")) for t in d.get("tasks", []) if t.get("task")=="deploy"} - {""}); print(json.dumps(pkgs))')"

          CHANGED_FILES="$(git diff --name-only "$BASE_SHA" "$CURRENT_SHA")"

          if [ "$CHANGED" = "[]" ]; then
            FALLBACK_PKGS="$(
              while IFS= read -r path; do
                case "$path" in
                  workers/api/*) echo "@repo/api" ;;
                  workers/queue/*) echo "@repo/queue" ;;
                  workers/scheduled/*) echo "@repo/scheduled" ;;
                  sites/marketing-site/*) echo "@repo/marketing-site" ;;
                  sites/business-dashboard/*) echo "@repo/business-dashboard" ;;
                esac
              done <<< "$CHANGED_FILES" | sort -u
            )"

            if [ -n "$FALLBACK_PKGS" ]; then
              CHANGED="$(printf '%s\n' "$FALLBACK_PKGS" | python3 -c 'import json,sys; print(json.dumps([l.strip() for l in sys.stdin if l.strip()]))')"
            fi
          fi

          CHANGED_FILES_TOTAL="$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
          CHANGED_FILES_PREVIEW="$(printf '%s\n' "$CHANGED_FILES" | sed '/^$/d' | head -n 20)"

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "filter=$FILTER" >> "$GITHUB_OUTPUT"
          echo "packages=$CHANGED" >> "$GITHUB_OUTPUT"
          echo "changed_files_total=$CHANGED_FILES_TOTAL" >> "$GITHUB_OUTPUT"
          echo "changed_files_preview<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED_FILES_PREVIEW" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Set deploy flags
        id: scope
        env:
          CHANGED_PACKAGES: ${{ steps.changed.outputs.packages }}
        run: |
          python3 - <<'PY'
          import json
          import os

          changed = set(json.loads(os.environ.get("CHANGED_PACKAGES", "[]")))
          targets = {
              "api": "@repo/api",
              "queue": "@repo/queue",
              "scheduled": "@repo/scheduled",
              "marketing": "@repo/marketing-site",
              "dashboard": "@repo/business-dashboard",
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              for key, pkg in targets.items():
                  out.write(f"{key}={'true' if pkg in changed else 'false'}\n")
              out.write(
                  f"any_target={'true' if any(pkg in changed for pkg in targets.values()) else 'false'}\n"
              )
          PY

      - name: Debug deploy scope
        run: |
          echo "Packages targeted: ${{ steps.changed.outputs.packages }}"
          echo "api=${{ steps.scope.outputs.api }}"
          echo "queue=${{ steps.scope.outputs.queue }}"
          echo "scheduled=${{ steps.scope.outputs.scheduled }}"
          echo "marketing=${{ steps.scope.outputs.marketing }}"
          echo "dashboard=${{ steps.scope.outputs.dashboard }}"
          echo "any_target=${{ steps.scope.outputs.any_target }}"

      - name: Apply D1 migrations
        # Idempotent — only unapplied migrations are executed.
        # Runs before the worker deploy so the schema is ready.
        if: steps.scope.outputs.api == 'true' && env.DEPLOY_WORKERS == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: workers/api
          command: d1 migrations apply TALASH_DB --env ${{ github.ref == 'refs/heads/staging' && 'staging' || 'production' }} --remote

      - name: Deploy API worker
        if: steps.scope.outputs.api == 'true' && env.DEPLOY_WORKERS == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: workers/api
          command: deploy --env ${{ github.ref == 'refs/heads/staging' && 'staging' || 'production' }} --minify

      - name: Deploy Queue worker
        if: steps.scope.outputs.queue == 'true' && env.DEPLOY_WORKERS == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: workers/queue
          command: deploy --env ${{ github.ref == 'refs/heads/staging' && 'staging' || 'production' }} --minify

      - name: Deploy Scheduled worker
        if: steps.scope.outputs.scheduled == 'true' && env.DEPLOY_WORKERS == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: workers/scheduled
          command: deploy --env ${{ github.ref == 'refs/heads/staging' && 'staging' || 'production' }} --minify

      - name: Deploy marketing site
        if: steps.scope.outputs.marketing == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        env:
          NEXT_PUBLIC_API_URL: https://api.mahannankhan.info
          API_URL: https://api.mahannankhan.info
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: sites/marketing-site
          preCommands: bunx opennextjs-cloudflare build
          command: deploy --env ${{ github.ref == 'refs/heads/staging' && 'staging' || 'production' }}

      - name: Deploy business dashboard
        if: steps.scope.outputs.dashboard == 'true'
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        env:
          NEXT_PUBLIC_API_URL: https://api.mahannankhan.info
          API_URL: https://api.mahannankhan.info
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: bun
          workingDirectory: sites/business-dashboard
          preCommands: bunx opennextjs-cloudflare build
          command: deploy --env ${{ github.ref == 'refs/heads/staging' && 'staging' || 'production' }}

      - name: No deploy targets changed
        if: steps.scope.outputs.any_target != 'true'
        run: echo "No deployable packages changed."

      - name: Deploy summary
        if: always()
        run: |
          echo "## Deploy summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Base SHA: \\`${{ steps.changed.outputs.base_sha }}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Turbo filter: \\`${{ steps.changed.outputs.filter }}\\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Packages targeted: \`${{ steps.changed.outputs.packages }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Changed files (total): ${{ steps.changed.outputs.changed_files_total }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Changed files preview (up to 20):" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.changed.outputs.changed_files_preview }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "API deployed: ${{ steps.scope.outputs.api }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Queue deployed: ${{ steps.scope.outputs.queue }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Scheduled deployed: ${{ steps.scope.outputs.scheduled }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Marketing site deployed: ${{ steps.scope.outputs.marketing }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Business dashboard deployed: ${{ steps.scope.outputs.dashboard }}" >> "$GITHUB_STEP_SUMMARY"
