name: DB Seed

# Manually triggered: seeds the shared remote D1 with faker demo data.
# The seed runs on a Linux runner because the CLI's remote-seed flow needs
# a local workerd, which cannot run on low-memory Windows dev machines.
on:
  workflow_dispatch:
    inputs:
      count:
        description: "Number of users to seed"
        default: "20"
        required: false
      seed:
        description: "RNG seed (same value = same dataset)"
        default: "42"
        required: false

permissions:
  contents: read

jobs:
  seed:
    name: Seed remote D1
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install

      - name: Seed remote database (staging env — shared D1)
        run: bun run cli db seed --env staging --seed ${{ inputs.seed }} --count ${{ inputs.count }}
